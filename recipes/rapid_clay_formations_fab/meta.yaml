{% set name = "rapid_clay_formations_fab" %}
{% set version = "0.6.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/rapid_clay_formations_fab-{{ version }}.tar.gz
  sha256: bb7da45bc9cf6d51a04e474c0b3305a4b4dfc218febdda5ca181263663ee56ab

build:
  number: 0
  noarch: python
  entry_points:
    - rcf = rapid_clay_formations_fab._cmd_entrypoint:main
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - python >=3.7
    - compas-rrc ~=1.0.0
    - compas_fab ~=0.11
    - confuse ~=1.3.0
    - docker-py ~=4.2.2
    - questionary ~=1.5.1

test:
  imports:
    - rapid_clay_formations_fab
    - rapid_clay_formations_fab.robots
    - rapid_clay_formations_fab.fab_data
    - rapid_clay_formations_fab.utils
    - rapid_clay_formations_fab.rhino
  commands:
    - pip check
    - rcf --help
    - pytest -vv
  requires:
    - pip
    - pytest

about:
  home: https://gramaziokohler.github.io/rapid_clay_formations_fab
  summary: Fabrication code for Rapid Clay Formations.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tetov
